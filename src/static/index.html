<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-controls">
        <button
          id="admin-toggle"
          class="icon-button"
          aria-label="Teacher login"
        >
          <span aria-hidden="true">👤</span>
        </button>
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <p id="admin-status" class="admin-status hidden"></p>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Teacher Activity Management</h3>
        <p id="signup-help" class="info-text">
          Teachers can log in to register or unregister students. Students can
          still view participants below.
        </p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input
              type="email"
              id="email"
              required
              placeholder="your-email@mergington.edu"
            />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="teacher-login-panel" class="teacher-login-panel hidden">
          <h4>Teacher Login</h4>
          <form id="login-form">
            <div class="form-group">
              <label for="username">Username:</label>
              <input
                type="text"
                id="username"
                required
                placeholder="teacher username"
              />
            </div>
            <div class="form-group">
              <label for="password">Password:</label>
              <input
                type="password"
                id="password"
                required
                placeholder="password"
              />
            </div>
            <div class="button-row">
              <button type="submit">Login</button>
              <button type="button" id="cancel-login" class="secondary-button">
                Cancel
              </button>
            </div>
          </form>
        </div>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
